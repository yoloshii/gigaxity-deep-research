name: Feature Request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Describe the use case.
      placeholder: I often need to... but currently the project...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
      placeholder: |
        A new MCP tool `foo` that...
        Or a new REST endpoint `/api/v1/bar` that...
        Or a new synthesis preset `baz` that...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about or workarounds you're using.
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the project would this affect?
      options:
        - MCP Server
        - REST API
        - Discovery Module
        - Synthesis Module
        - Connectors (SearXNG, Tavily, LinkUp)
        - LLM Client (OpenRouter / local inference)
        - Configuration
        - Docker / Deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been requested
          required: true
